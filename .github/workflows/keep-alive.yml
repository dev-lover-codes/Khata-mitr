name: Keep Alive

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  database_heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Validate required secrets
        run: |
          missing=0
          [ -z "${{ secrets.SUPABASE_URL }}" ] && echo "::error::SUPABASE_URL secret is missing" && missing=1
          [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ] && echo "::error::SUPABASE_ANON_KEY secret is missing" && missing=1
          [ "$missing" -eq 1 ] && exit 1 || true

      - name: Execute Live Supabase Database Query
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          http_code=$(curl -s -o response.json -w "%{http_code}" \
            "${SB_URL}/rest/v1/" \
            -H "apikey: ${SB_KEY}" \
            -H "Authorization: Bearer ${SB_KEY}")

          echo "HTTP status: $http_code"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Supabase heartbeat failed with status $http_code"
            cat response.json
            exit 1
          fi

          echo "Supabase heartbeat OK ($http_code)"

      - name: Update heartbeat file and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Automation Bot"

          echo "Last heartbeat: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > library_heartbeat.txt

          git add library_heartbeat.txt
          git commit -m "chore: keep-alive heartbeat" || { echo "Nothing to commit"; exit 0; }

          git pull --rebase origin main
          git push origin HEAD:main
